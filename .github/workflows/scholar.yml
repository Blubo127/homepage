name: Update Scholar stats

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scholarly
        run: pip install scholarly

      - name: Fetch Scholar stats
        run: python scripts/fetch_scholar.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain meta/scholar.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add meta/scholar.json
            git commit -m "chore: update Scholar stats"
            git push
          else
            echo "no change in meta/scholar.json"
          fi
